<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نجم كلاود | منصة الاستضافة السحابية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f1020;
            font-family: 'Tajawal', system-ui;
            color: #eef5ff;
            padding: 2rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid #00d2ff;
            padding-bottom: 1rem;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #00d2ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .badge {
            background: #161b33;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
            border: 1px solid #00d2ff;
        }
        .developer-card {
            background: linear-gradient(135deg, #161b33, #0f1225);
            border-radius: 20px;
            padding: 1.2rem 1.8rem;
            margin-bottom: 2rem;
            border: 1px solid #00d2ff;
        }
        .input-wrapper {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .input-wrapper input {
            flex: 1;
            background: #0a0c18;
            border: 1px solid #2a2f4b;
            border-radius: 60px;
            padding: 0.9rem 1.5rem;
            color: white;
        }
        button {
            background: transparent;
            border: 1px solid #00d2ff;
            border-radius: 60px;
            padding: 0.7rem 1.5rem;
            color: #00d2ff;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #00d2ff;
            color: #0f1020;
        }
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #2a2f4b;
            padding-bottom: 0.5rem;
        }
        .tab {
            background: none;
            border: none;
            padding: 0.8rem 1.5rem;
            color: #8e9aaf;
            cursor: pointer;
        }
        .tab.active {
            color: #00d2ff;
            border-bottom: 2px solid #00d2ff;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.8rem;
        }
        .card {
            background: #161b33;
            border-radius: 28px;
            padding: 1.5rem;
            border: 1px solid rgba(0, 210, 255, 0.2);
        }
        .card-title {
            font-size: 1.3rem;
            margin-bottom: 1.4rem;
            border-right: 4px solid #00d2ff;
            padding-right: 12px;
        }
        textarea {
            width: 100%;
            min-height: 280px;
            background: #0a0c18;
            border: 1px solid #2a2f4b;
            border-radius: 20px;
            padding: 1rem;
            color: white;
            font-family: monospace;
            font-size: 0.85rem;
        }
        .env-item {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .env-item input {
            flex: 1;
            background: #0a0c18;
            border: 1px solid #2a2f4b;
            border-radius: 12px;
            padding: 0.5rem;
            color: white;
        }
        .terminal {
            background: #05070f;
            border-radius: 20px;
            padding: 1rem;
            max-height: 280px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8rem;
        }
        .log-success { color: #00ff99; }
        .log-error { color: #ff3366; }
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }
        .project-card {
            background: #0a0c18;
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid #2a2f4b;
        }
        .project-name {
            color: #00d2ff;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }
        .project-actions {
            display: flex;
            gap: 10px;
            margin-top: 1rem;
        }
        .project-actions button {
            flex: 1;
            padding: 0.5rem;
            font-size: 0.8rem;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #8e9aaf;
        }
        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
            body { padding: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">🚀 نجم كلاود | Najm Cloud</div>
        <div class="badge">v15.0</div>
    </div>

    <div class="developer-card">
        <div style="margin-bottom: 12px;">🔑 معرف المطور (Developer ID)</div>
        <div class="input-wrapper">
            <input type="text" id="userIdInput" placeholder="مثال: najm_dev_001" dir="ltr">
            <button id="saveUserIdBtn">💾 حفظ المعرف</button>
            <button id="scanProjectsBtn">📡 مسح المشاريع</button>
        </div>
        <div id="userIdStatus" style="color: #00ff99; margin-top: 8px;"></div>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="editor">✏️ محرر النشر</button>
        <button class="tab" data-tab="projects">📁 مشاريعي</button>
        <button class="tab" data-tab="history">📜 سجل النشر</button>
    </div>

        <div class="grid">
            <div class="card">
                <div class="card-title">⚙️ معلومات المشروع</div>
