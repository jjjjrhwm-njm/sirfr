<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>نجم للاستضافة | لوحة تحكم النشر</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0f1020;
            --card-bg: #161b33;
            --primary: #00d2ff;
            --primary-glow: rgba(0, 210, 255, 0.3);
            --success: #00ff99;
            --success-glow: rgba(0, 255, 153, 0.2);
            --danger: #ff3366;
            --text-light: #eef5ff;
            --text-muted: #8e9aaf;
            --border-dim: #2a2f4b;
            --code-bg: #0a0c18;
            --terminal-bg: #05070f;
            --gradient-btn: linear-gradient(95deg, #00d2ff, #3a0ca3);
        }

        body {
            background: var(--bg-deep);
            font-family: 'Tajawal', 'Segoe UI', system-ui, -apple-system, 'Courier New', monospace;
            color: var(--text-light);
            line-height: 1.5;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }

        /* modern scroll */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-deep);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 8px;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* header cyberpunk */
        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 1rem;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .logo-area i {
            font-size: 2rem;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: var(--primary);
        }
        .badge-version {
            background: var(--card-bg);
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-family: monospace;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        /* grid layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.8rem;
        }
        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            body {
                padding: 1.2rem;
            }
        }

        /* cards */
        .card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 1.5rem;
            border: 1px solid rgba(0, 210, 255, 0.2);
            box-shadow: 0 12px 28px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
            backdrop-filter: blur(1px);
        }
        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1.4rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border-right: 4px solid var(--primary);
            padding-right: 12px;
        }

        /* input styles */
        .input-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-muted);
            font-size: 0.85rem;
            letter-spacing: 0.3px;
        }
        input, textarea {
            width: 100%;
            background: var(--code-bg);
            border: 1px solid var(--border-dim);
            border-radius: 16px;
            padding: 0.9rem 1rem;
            color: var(--text-light);
            font-size: 0.95rem;
            font-family: 'Fira Code', 'Courier New', monospace;
            transition: 0.2s;
            outline: none;
        }
        input:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary-glow);
        }

        /* code editor with line numbers simulation */
        .code-editor-wrapper {
            position: relative;
            background: var(--code-bg);
            border-radius: 20px;
            border: 1px solid var(--border-dim);
            overflow: hidden;
        }
        .code-header {
            background: #0a0c1a;
            padding: 0.6rem 1rem;
            font-size: 0.75rem;
            border-bottom: 1px solid var(--border-dim);
            color: var(--primary);
            font-family: monospace;
            display: flex;
            justify-content: space-between;
        }
        .editor-container {
            display: flex;
            direction: ltr;
            text-align: left;
        }
        .line-numbers {
            background: #070915;
            padding: 1rem 0.75rem;
            text-align: center;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-left: 1px solid var(--border-dim);
            user-select: none;
            line-height: 1.5;
        }
        #codeInput {
            border: none;
            border-radius: 0;
            resize: vertical;
            min-height: 280px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            background: var(--code-bg);
            padding: 1rem;
            width: 100%;
            direction: ltr;
        }
        #codeInput:focus {
            box-shadow: none;
        }

        /* env vars dynamic */
        .env-list {
            margin-bottom: 1rem;
            max-height: 260px;
            overflow-y: auto;
            padding-left: 4px;
        }
        .env-item {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1rem;
            align-items: center;
            flex-wrap: wrap;
            background: rgba(10, 12, 24, 0.6);
            padding: 0.6rem;
            border-radius: 20px;
        }
        .env-key {
            flex: 1.2;
            min-width: 110px;
        }
        .env-value-wrapper {
            flex: 2;
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .env-value {
            flex: 1;
            font-family: monospace;
            padding-left: 2rem;
        }
        .toggle-pwd {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: 1.2rem;
            display: inline-flex;
            align-items: center;
        }
        .delete-env {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.1s;
        }
        .btn-secondary {
            background: transparent;
            border: 1px dashed var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            color: var(--primary);
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
            width: fit-content;
        }
        .btn-secondary:hover {
            background: var(--primary);
            color: var(--bg-deep);
            box-shadow: 0 0 8px var(--primary-glow);
        }

        /* deploy button */
        .deploy-btn {
            background: var(--gradient-btn);
            border: none;
            width: 100%;
            padding: 1rem;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 1.5rem 0 1rem;
            font-family: inherit;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .deploy-btn:hover {
            transform: scale(1.01);
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .deploy-btn:active {
            transform: scale(0.98);
        }

        /* terminal logs */
        .terminal-section {
            margin-top: 2rem;
        }
        .terminal {
            background: var(--terminal-bg);
            border-radius: 20px;
            padding: 1rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            border: 1px solid #2a2f4b;
            max-height: 280px;
            overflow-y: auto;
            direction: ltr;
            text-align: left;
        }
        .log-line {
            color: #b0ffd0;
            border-bottom: 1px dotted rgba(0,210,255,0.2);
            padding: 5px 0;
            font-family: monospace;
            white-space: pre-wrap;
        }
        .log-success {
            color: var(--success);
            text-shadow: 0 0 3px var(--success-glow);
        }
        .log-error {
            color: var(--danger);
        }

        /* small util */
        .rtl-respect {
            direction: rtl;
        }
        hr {
            border-color: var(--border-dim);
            margin: 1rem 0;
        }
        .final-url {
            background: #0f121f;
            padding: 0.8rem;
            border-radius: 14px;
            font-family: monospace;
            word-break: break-all;
            margin-top: 12px;
            border-right: 3px solid var(--success);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="header">
        <div class="logo-area">
            <span>🚀</span>
            <span>منصة نجم للاستضافة</span>
        </div>
        <div class="badge-version">v2.0 · Najm Cloud</div>
    </div>

    <div class="dashboard-grid">
        <!-- العمود الأيمن: معلومات المشروع + محرر الأكواد -->
        <div class="card">
            <div class="card-title">
                <span>⚙️</span> <span>معلومات المشروع</span>
            </div>
            <div class="input-group">
                <label>📦 اسم المشروع (Project Name)</label>
                <input type="text" id="projectName" placeholder="مثال: my-telegram-bot" dir="ltr">
            </div>
            <div class="card-title" style="margin-top: 8px;">
                <span>💻</span> <span>محرر الأكواد (JS / Python)</span>
            </div>
            <div class="code-editor-wrapper">
                <div class="code-header">
                    <span>📄 Editor</span>
                    <span>▸ متوافق مع JS / Python</span>
                </div>
                <div class="editor-container">
                    <div class="line-numbers" id="lineNumbers">1<br>2<br>3<br>4<br>5<br>6<br>7<br>8</div>
                    <textarea id="codeInput" placeholder="// اكتب كود البوت أو السكربت هنا ...&#10;console.log('Hello Najm Cloud');&#10;# أو بايثون"></textarea>
                </div>
            </div>
        </div>

        <!-- العمود الأيسر: المتغيرات السرية + لوحة التحكم -->
        <div class="card">
            <div class="card-title">
                <span>🔐</span> <span>المتغيرات البيئية (Secrets)</span>
            </div>
            <div id="envVarsContainer" class="env-list">
                <!-- سيتم إضافة عناصر المتغيرات ديناميكياً هنا -->
                <div class="env-item" data-id="0">
                    <input type="text" class="env-key" placeholder="KEY" dir="ltr" value="API_TOKEN">
                    <div class="env-value-wrapper">
                        <input type="password" class="env-value" placeholder="VALUE" dir="ltr" value="your_secret_123">
                        <button class="toggle-pwd" data-toggle="0">👁️</button>
                    </div>
                    <button class="delete-env" data-id="0">✖</button>
                </div>
            </div>
            <button id="addEnvBtn" class="btn-secondary">+ إضافة متغير جديد</button>

            <button id="deployBtn" class="deploy-btn">
                <span>🚀</span> نشر المشروع الآن
            </button>

            <!-- قسم المحاكاة الطرفية (Terminal Logs) -->
            <div class="terminal-section">
                <div class="card-title" style="margin-bottom: 0.5rem;">
                    <span>📟</span> <span>سجل النشر (Live Logs)</span>
                </div>
                <div id="terminalLogs" class="terminal">
                    <div class="log-line">⏳ انتظر بدء النشر...</div>
                </div>
                <div id="deployResult" style="margin-top: 12px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- DOM elements ----------
    const projectNameInput = document.getElementById('projectName');
    const codeTextarea = document.getElementById('codeInput');
    const envContainer = document.getElementById('envVarsContainer');
    const addEnvBtn = document.getElementById('addEnvBtn');
    const deployBtn = document.getElementById('deployBtn');
    const terminalDiv = document.getElementById('terminalLogs');
    const deployResultDiv = document.getElementById('deployResult');

    // line numbers sync
    const lineNumbersDiv = document.getElementById('lineNumbers');
    function updateLineNumbers() {
        const text = codeTextarea.value;
        const lines = text.split('\n').length;
        let numbersHtml = '';
        for (let i = 1; i <= lines; i++) {
            numbersHtml += i + '<br>';
        }
        lineNumbersDiv.innerHTML = numbersHtml || '1<br>';
    }
    codeTextarea.addEventListener('input', updateLineNumbers);
    codeTextarea.addEventListener('scroll', function() {
        lineNumbersDiv.scrollTop = codeTextarea.scrollTop;
    });
    updateLineNumbers();

    // helper: generate unique id for each env row
    let envCounter = 1;
    function createEnvRow(keyVal = '', valVal = '', id = null) {
        const rowId = id !== null ? id : envCounter++;
        const div = document.createElement('div');
        div.className = 'env-item';
        div.setAttribute('data-id', rowId);
        // key input
        const keyInput = document.createElement('input');
        keyInput.type = 'text';
        keyInput.className = 'env-key';
        keyInput.placeholder = 'KEY';
        keyInput.dir = 'ltr';
        keyInput.value = keyVal;
        // value wrapper
        const wrapper = document.createElement('div');
        wrapper.className = 'env-value-wrapper';
        const valueInput = document.createElement('input');
        valueInput.type = 'password';
        valueInput.className = 'env-value';
        valueInput.placeholder = 'VALUE';
        valueInput.dir = 'ltr';
        valueInput.value = valVal;
        const toggleBtn = document.createElement('button');
        toggleBtn.innerText = '👁️';
        toggleBtn.className = 'toggle-pwd';
        toggleBtn.setAttribute('data-toggle', rowId);
        toggleBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const inp = wrapper.querySelector('.env-value');
            if (inp.type === 'password') {
                inp.type = 'text';
                toggleBtn.innerText = '🙈';
            } else {
                inp.type = 'password';
                toggleBtn.innerText = '👁️';
            }
        });
        wrapper.appendChild(valueInput);
        wrapper.appendChild(toggleBtn);

        const delBtn = document.createElement('button');
        delBtn.innerText = '✖';
        delBtn.className = 'delete-env';
        delBtn.setAttribute('data-id', rowId);
        delBtn.addEventListener('click', () => {
            div.remove();
        });
        div.appendChild(keyInput);
        div.appendChild(wrapper);
        div.appendChild(delBtn);
        return div;
    }

    // initialize at least one row with sample (if needed)
    function initEnvRows() {
        // clear default if we want to keep placeholder? but there is existing .env-item demo, remove it and add fresh
        while(envContainer.firstChild) {
            envContainer.removeChild(envContainer.firstChild);
        }
        const firstRow = createEnvRow('API_KEY', 'sk_test_najm123', 0);
        envContainer.appendChild(firstRow);
        envCounter = 1;
    }
    initEnvRows();

    addEnvBtn.addEventListener('click', () => {
        const newRow = createEnvRow('', '', envCounter);
        envContainer.appendChild(newRow);
    });

    // collect environment variables as object
    function collectEnvVars() {
        const envItems = document.querySelectorAll('.env-item');
        const envObject = {};
        for (let item of envItems) {
            const keyInput = item.querySelector('.env-key');
            const valInput = item.querySelector('.env-value');
            const key = keyInput ? keyInput.value.trim() : '';
            const val = valInput ? valInput.value : '';
            if (key !== '') {
                envObject[key] = val;
            }
        }
        return envObject;
    }

    // terminal logger (simulate steps)
    function addLog(message, isError = false, isSuccess = false) {
        const logLine = document.createElement('div');
        logLine.className = 'log-line';
        if (isError) logLine.classList.add('log-error');
        if (isSuccess) logLine.classList.add('log-success');
        const timestamp = new Date().toLocaleTimeString();
        logLine.innerText = `[${timestamp}] ${message}`;
        terminalDiv.appendChild(logLine);
        terminalDiv.scrollTop = terminalDiv.scrollHeight;
    }

    function clearLogs() {
        terminalDiv.innerHTML = '';
    }

    function resetDeployButton(enable = true) {
        if(enable) {
            deployBtn.disabled = false;
            deployBtn.innerHTML = '<span>🚀</span> نشر المشروع الآن';
        } else {
            deployBtn.disabled = true;
            deployBtn.innerHTML = '<span>⏳</span> جاري النشر ...';
        }
    }

    // simulate stepwise logs and then call actual backend
    async function performDeploy() {
        // validation
        const projectName = projectNameInput.value.trim();
        const codeContent = codeTextarea.value.trim();
        if (!projectName) {
            addLog('❌ خطأ: اسم المشروع مطلوب', true);
            deployResultDiv.innerHTML = '<div class="final-url" style="border-right-color: var(--danger);">⚠️ يرجى إدخال اسم المشروع</div>';
            return false;
        }
        if (!codeContent) {
            addLog('❌ خطأ: محتوى الكود لا يمكن أن يكون فارغاً', true);
            deployResultDiv.innerHTML = '<div class="final-url" style="border-right-color: var(--danger);">⚠️ يرجى كتابة الكود (JavaScript/Python)</div>';
            return false;
        }

        // clear previous result and logs (but keep fresh start)
        clearLogs();
        deployResultDiv.innerHTML = '';
        addLog('🔄 بدء عملية النشر على Najm Cloud...');
        addLog(`📡 المشروع: ${projectName}`);
        
        // simulate cyberpunk steps
        await delay(400);
        addLog('🔌 Connecting to Najm Cloud Gateway...');
        await delay(500);
        addLog('🔐 Encrypting Secrets & Environment Variables...');
        await delay(600);
        addLog('📦 تجهيز البيئة ورفع الأكواد');
        await delay(400);
        addLog('🤖 Pushing to Telegram DB & Distributed Storage...');
        await delay(700);
        
        // collect env
        const envVars = collectEnvVars();
        addLog(`🔑 تم جمع ${Object.keys(envVars).length} متغيراً محمياً`);
        
        // build payload
        const payload = {
            project_name: projectName,
            code: codeContent,
            environment_variables: envVars,
            timestamp: new Date().toISOString()
        };
        
        addLog('📤 إرسال البيانات إلى منصة نجم (Najm Backend)...');
        
        try {
            const response = await fetch('https://najm-backend.60jrhwm.workers.dev', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            let responseData;
            const contentType = response.headers.get('content-type');
            if (contentType && contentType.includes('application/json')) {
                responseData = await response.json();
            } else {
                const text = await response.text();
                try {
                    responseData = JSON.parse(text);
                } catch(e) {
                    responseData = { message: text, success: response.ok };
                }
            }
            
            if (response.ok) {
                addLog('✅ تم النشر بنجاح على Najm Cloud!', false, true);
                const finalUrl = `https://najm-server.60jrhwm.workers.dev/${encodeURIComponent(projectName)}`;
                addLog(`🌍 URL النهائي: ${finalUrl}`, false, true);
                deployResultDiv.innerHTML = `
                    <div class="final-url">
                        🚀 تم النشر! الرابط: <strong dir="ltr"><a href="${finalUrl}" target="_blank" style="color: var(--success);">${finalUrl}</a></strong>
                        <br><span style="font-size:0.7rem;">✨ استمتع بتشغيل البوت أو السكربت</span>
                    </div>
                `;
                // optional: show extra success message from backend
                if(responseData && responseData.message) {
                    addLog(`📡 خادم: ${responseData.message}`, false, true);
                }
                return true;
            } else {
                // error from backend
                let errorMsg = responseData?.error || responseData?.message || 'فشل النشر من الخادم';
                addLog(`💥 خطأ من المنصة: ${errorMsg}`, true);
                deployResultDiv.innerHTML = `<div class="final-url" style="border-right-color: var(--danger);">⚠️ فشل النشر: ${errorMsg}</div>`;
                return false;
            }
        } catch (err) {
            console.error(err);
            addLog(`🔥 فشل الاتصال: ${err.message || 'Network error'}`, true);
            deployResultDiv.innerHTML = `<div class="final-url" style="border-right-color: var(--danger);">❌ خطأ في الشبكة أو الخادم: ${err.message}</div>`;
            return false;
        }
    }
    
    function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
    
    // deploy handler with loading state
    let isDeploying = false;
    deployBtn.addEventListener('click', async () => {
        if (isDeploying) {
            addLog('⚠️ عملية نشر جارية بالفعل، انتظر قليلاً', true);
            return;
        }
        isDeploying = true;
        resetDeployButton(false);
        try {
            await performDeploy();
        } catch (finalErr) {
            addLog(`خطأ غير متوقع: ${finalErr}`, true);
        } finally {
            isDeploying = false;
            resetDeployButton(true);
        }
    });
    
    // sync line numbers on window load and resize
    window.addEventListener('load', () => {
        updateLineNumbers();
        // Set default code sample to demonstrate
        if(!codeTextarea.value) {
            codeTextarea.value = `// مثال بوت تيليجرام بالبايثون (أو جافاسكريبت)
console.log("مرحباً من نجم للاستضافة!");
/*
   يمكنك وضع كود بوتك هنا.
   تدعم المنصة JavaScript و Python.
*/
function handleUpdate(update) {
   return "تم الاستقبال";
}`;
            updateLineNumbers();
        }
        if(!projectNameInput.value) {
            projectNameInput.value = "najm-bot-demo";
        }
    });
    
    // extra: ensure that textarea scroll syncs
    codeTextarea.addEventListener('scroll', () => {
        lineNumbersDiv.scrollTop = codeTextarea.scrollTop;
    });
</script>
</body>
</html>
