<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>نجم كلاود | منصة الاستضافة السحابية v17.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-deep: #0f1020; --card-bg: #161b33; --primary: #00d2ff;
            --primary-glow: rgba(0, 210, 255, 0.3); --success: #00ff99;
            --danger: #ff3366; --warning: #ffaa00; --update: #aa66ff;
            --text-light: #eef5ff; --text-muted: #8e9aaf; --border-dim: #2a2f4b;
            --code-bg: #0a0c18; --terminal-bg: #05070f;
            --gradient-btn: linear-gradient(95deg, #00d2ff, #3a0ca3);
        }

        body { background: var(--bg-deep); font-family: 'Tajawal', monospace; color: var(--text-light); line-height: 1.5; padding: 2rem 1.5rem; min-height: 100vh; }
        .progress-bar-container { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: rgba(0, 210, 255, 0.2); z-index: 10000; opacity: 0; transition: opacity 0.3s; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--success)); width: 0%; transition: width 0.3s ease-out; box-shadow: 0 0 10px var(--primary); }
        .progress-bar-container.active { opacity: 1; }
        ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: var(--bg-deep); } ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 8px; }
        .dashboard-container { max-width: 1600px; margin: 0 auto; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; border-bottom: 2px solid var(--primary); padding-bottom: 1rem; }
        .logo-area { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
        .badge-version { background: var(--card-bg); padding: 0.3rem 0.8rem; border-radius: 40px; font-size: 0.8rem; border: 1px solid var(--primary); color: var(--primary); }
        .developer-card { background: linear-gradient(135deg, var(--card-bg) 0%, #0f1225 100%); border-radius: 20px; padding: 1.2rem 1.8rem; margin-bottom: 2rem; border: 1px solid var(--primary); box-shadow: 0 0 20px var(--developer-glow); }
        .developer-input-wrapper { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .developer-input-wrapper input { flex: 1; background: var(--code-bg); border: 1px solid var(--primary); border-radius: 60px; padding: 0.9rem 1.5rem; color: var(--text-light); }
        .btn-action { background: transparent; border: 1px solid var(--primary); border-radius: 60px; padding: 0.7rem 1.5rem; color: var(--primary); font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-action:hover { background: var(--primary); color: var(--bg-deep); }
        .tabs-nav { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border-dim); padding-bottom: 0.5rem; }
        .tab-btn { background: transparent; border: none; padding: 0.8rem 1.5rem; color: var(--text-muted); font-size: 1rem; font-weight: bold; cursor: pointer; border-radius: 12px; transition: 0.3s; }
        .tab-btn.active { color: var(--primary); background: rgba(0, 210, 255, 0.1); border-bottom: 2px solid var(--primary); }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.8rem; }
        @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }
        .card { background: var(--card-bg); border-radius: 28px; padding: 1.5rem; border: 1px solid rgba(0, 210, 255, 0.2); }
        .card-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 1.4rem; border-right: 4px solid var(--primary); padding-right: 12px; }
        .code-editor-wrapper { background: var(--code-bg); border-radius: 20px; border: 1px solid var(--border-dim); overflow: hidden; }
        .code-header { background: #0a0c1a; padding: 0.6rem 1rem; font-size: 0.75rem; border-bottom: 1px solid var(--border-dim); color: var(--primary); display: flex; justify-content: space-between; }
        .editor-container { display: flex; direction: ltr; }
        .line-numbers { background: #070915; padding: 1rem 0.75rem; text-align: right; color: var(--text-muted); border-left: 1px solid var(--border-dim); user-select: none; line-height: 1.5; min-width: 40px; }
        #codeInput { border: none; resize: vertical; min-height: 350px; background: transparent; padding: 1rem; width: 100%; direction: ltr; color: var(--text-light); outline: none; line-height: 1.5; font-family: monospace; }
        .env-list { margin-bottom: 1rem; max-height: 260px; overflow-y: auto; }
        .env-item { display: flex; gap: 0.8rem; margin-bottom: 1rem; background: rgba(10,12,24,0.6); padding: 0.6rem; border-radius: 20px; }
        .env-key, .env-value { flex: 1; background: var(--code-bg); border: 1px solid var(--border-dim); border-radius: 12px; padding: 0.5rem; color: var(--text-light); }
        .deploy-btn { background: var(--gradient-btn); border: none; width: 100%; padding: 1rem; font-size: 1.3rem; font-weight: bold; border-radius: 60px; color: white; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .deploy-btn.update-mode { background: linear-gradient(95deg, #aa66ff, #6a1b9a); }
        .terminal { background: var(--terminal-bg); border-radius: 20px; padding: 1rem; font-family: monospace; font-size: 0.8rem; border: 1px solid #2a2f4b; max-height: 200px; overflow-y: auto; margin-top: 15px; }
        .log-line { color: #b0ffd0; border-bottom: 1px dotted rgba(0,210,255,0.2); padding: 5px 0; white-space: pre-wrap; }
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .project-card { background: var(--card-bg); border-radius: 20px; padding: 1.2rem; border: 1px solid var(--border-dim); transition: 0.3s; }
        .project-card:hover { border-color: var(--primary); transform: translateY(-4px); }
        .project-name { font-size: 1.2rem; font-weight: bold; color: var(--primary); }
        .project-btn { flex: 1; background: transparent; border: 1px solid var(--border-dim); border-radius: 12px; padding: 0.5rem; color: var(--text-light); cursor: pointer; }
        .project-btn:hover { border-color: var(--primary); color: var(--primary); }
    </style>
</head>
<body>

<div class="progress-bar-container" id="progressContainer"><div class="progress-bar" id="progressBar"></div></div>

<div class="dashboard-container">
    <div class="header">
        <div class="logo-area">🚀 نجم كلاود</div>
        <div class="badge-version">v17.0 · KV Storage System</div>
    </div>

    <div class="developer-card">
        <div style="margin-bottom:10px;">🔑 معرف المطور الخاص بك</div>
        <div class="developer-input-wrapper">
            <input type="text" id="userIdInput" placeholder="مثال: najm_dev" dir="ltr">
            <button class="btn-action" onclick="saveUserId()">💾 حفظ</button>
            <button class="btn-action" onclick="scanDatabaseProjects()">📡 تحميل المشاريع</button>
        </div>
    </div>

    <div class="tabs-nav">
        <button class="tab-btn active" data-tab="editor">✏️ محرر النشر</button>
        <button class="tab-btn" data-tab="projects">📁 مشاريعي</button>
    </div>

    <div id="editorTab" class="tab-content">
        <div class="dashboard-grid">
            <div class="card">
                <div class="card-title">⚙️ معلومات المشروع</div>
                <div style="margin-bottom: 1.5rem;">
                    <input type="text" id="projectName" placeholder="اسم المشروع (مثال: my-bot)" dir="ltr" style="width:100%; padding:1rem; border-radius:12px; background:var(--code-bg); border:1px solid var(--border-dim); color:white;">
                </div>
                <div class="card-title">💻 محرر الأكواد</div>
                <div class="code-editor-wrapper">
                    <div class="code-header"><span>index.js</span><span id="editModeBadge" style="color:var(--warning);"></span></div>
                    <div class="editor-container">
                        <div class="line-numbers" id="lineNumbers">1</div>
                        <textarea id="codeInput" placeholder="// اكتب الكود هنا..."></textarea>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">🔐 المتغيرات البيئية (Secrets)</div>
                <div id="envVarsContainer" class="env-list"></div>
                <button onclick="addEnvRow()" class="btn-action" style="width:100%; border-style:dashed;">+ إضافة متغير</button>
                
                <button id="deployBtn" class="deploy-btn" onclick="performDeploy()">🚀 حفظ ونشر المشروع</button>
                <button id="cancelEditBtn" class="btn-action" onclick="cancelEditMode()" style="display:none; width:100%; margin-top:10px; border-color:var(--danger); color:var(--danger);">✖ إلغاء التعديل</button>
                
                <div class="terminal-section">
                    <div class="card-title" style="margin-top:20px;">📟 سجل الخادم</div>
                    <div id="terminalLogs" class="terminal"><div class="log-line">⏳ جاهز للعمل...</div></div>
                    <div id="deployResult" style="margin-top: 12px; font-family:monospace; word-break:break-all;"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="projectsTab" class="tab-content" style="display: none;">
        <div class="card">
            <div class="card-title">📁 مشاريعي في السحابة</div>
            <div id="projectsGrid" class="projects-grid">
                <div style="grid-column:1/-1; text-align:center; padding:2rem; color:var(--text-muted);">✨ اضغط "تحميل المشاريع" لعرضها</div>
            </div>
        </div>
    </div>
</div>

<script>
    let projectsCache = [];
    let currentEditProject = null;
    const API_URL = "https://najm-backend.60jrhwm.workers.dev"; // تأكد إن هذا هو رابط كلودفلير حقك الصح

    window.onload = () => {
        if(localStorage.getItem('najm_uid')) document.getElementById('userIdInput').value = localStorage.getItem('najm_uid');
        addEnvRow('BOT_TOKEN', '');
        updateLineNumbers();
    };

    function saveUserId() {
        const id = document.getElementById('userIdInput').value.trim();
        if(id) { localStorage.setItem('najm_uid', id); log("تم حفظ المعرف!"); }
    }

    async function scanDatabaseProjects() {
        const uid = document.getElementById('userIdInput').value.trim();
        if(!uid) return alert("الرجاء حفظ المعرف أولاً");
        
        showProgress(true);
        log(`🔍 جاري سحب المشاريع من قاعدة البيانات للمعرف: ${uid}...`);
        
        try {
            const response = await fetch(`${API_URL}/get-projects?user_id=${encodeURIComponent(uid)}`);
            const data = await response.json();
            
            if(data.success) {
                projectsCache = data.projects;
                renderProjects();
                log(`✅ تم تحميل ${projectsCache.length} مشروع`);
                document.querySelector('[data-tab="projects"]').click();
            } else {
                throw new Error(data.error);
            }
        } catch (e) {
            log(`❌ فشل تحميل المشاريع: ${e.message}`, true);
        }
        showProgress(false);
    }

    function renderProjects() {
        const grid = document.getElementById('projectsGrid');
        if(projectsCache.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center;">لا توجد مشاريع مسجلة بهذا المعرف</div>';
            return;
        }
        
        grid.innerHTML = projectsCache.map(p => `
            <div class="project-card">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                    <span class="project-name">📦 ${p.name}</span>
                    <span style="color:var(--success); font-size:0.8rem;">🟢 نشط</span>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="project-btn" onclick="editProject('${p.name}')">✏️ تعديل</button>
                    <button class="project-btn" style="border-color:var(--success); color:var(--success);" onclick="window.open('${p.url}')">🔗 زيارة</button>
                </div>
            </div>
        `).join('');
    }

    window.editProject = function(pid) {
        const p = projectsCache.find(x => x.name === pid);
        if(!p) return;
        
        document.getElementById('projectName').value = p.name;
        document.getElementById('codeInput').value = p.code;
        
        const envC = document.getElementById('envVarsContainer');
        envC.innerHTML = '';
        if(Object.keys(p.envVars).length > 0) {
            Object.entries(p.envVars).forEach(([k,v]) => addEnvRow(k,v));
        } else {
            addEnvRow('', '');
        }
        
        currentEditProject = pid;
        document.getElementById('deployBtn').innerHTML = '🔄 رفع التحديث';
        document.getElementById('deployBtn').classList.add('update-mode');
        document.getElementById('cancelEditBtn').style.display = 'block';
        document.getElementById('editModeBadge').innerText = ` [تعديل: ${pid}]`;
        
        updateLineNumbers();
        document.querySelector('[data-tab="editor"]').click();
        log(`تم تجهيز مشروع [${pid}] للتعديل`);
    };

    function cancelEditMode() {
        currentEditProject = null;
        document.getElementById('projectName').value = '';
        document.getElementById('codeInput').value = '';
        document.getElementById('envVarsContainer').innerHTML = '';
        addEnvRow('BOT_TOKEN', '');
        document.getElementById('deployBtn').innerHTML = '🚀 حفظ ونشر المشروع';
        document.getElementById('deployBtn').classList.remove('update-mode');
        document.getElementById('cancelEditBtn').style.display = 'none';
        document.getElementById('editModeBadge').innerText = '';
        updateLineNumbers();
    }

    async function performDeploy() {
        const uid = document.getElementById('userIdInput').value.trim();
        const pid = document.getElementById('projectName').value.trim();
        const code = document.getElementById('codeInput').value;
        
        if(!uid || !pid || !code) return alert("أكمل البيانات المطلوبة!");
        
        const vars = {};
        document.querySelectorAll('.env-item').forEach(item => {
            const k = item.querySelector('.env-key').value.trim();
            const v = item.querySelector('.env-value').value;
            if(k) vars[k] = v;
        });

        showProgress(true);
        document.getElementById('deployBtn').disabled = true;
        log(`🚀 جاري الإرسال لقاعدة بيانات Cloudflare...`);

        try {
            const response = await fetch(`${API_URL}/deploy`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: uid, project_name: pid, code: code, environment_variables: vars })
            });

            const result = await response.json();
            
            if(response.ok && result.success) {
                log('✅ تم الحفظ والنشر بنجاح!', false, true);
                const finalUrl = `https://vercelseifr.vercel.app/${encodeURIComponent(uid)}/${encodeURIComponent(pid)}`;
                document.getElementById('deployResult').innerHTML = `<div style="padding:10px; background:rgba(0,255,153,0.1); border:1px solid var(--success); border-radius:10px;">الرابط:<br><a href="${finalUrl}" target="_blank" style="color:var(--success); text-decoration:none;">${finalUrl}</a></div>`;
                
                const existing = projectsCache.findIndex(x => x.name === pid);
                const projObj = { name: pid, code, envVars: vars, url: finalUrl };
                if(existing !== -1) projectsCache[existing] = projObj;
                else projectsCache.unshift(projObj);
                renderProjects();
                
            } else throw new Error(result.error || "خطأ غير معروف");
        } catch (e) {
            log(`❌ فشل: ${e.message}`, true);
        }
        
        document.getElementById('deployBtn').disabled = false;
        showProgress(false);
    }

    function addEnvRow(k='', v='') {
        const div = document.createElement('div');
        div.className = 'env-item';
        div.innerHTML = `<input type="text" class="env-key" placeholder="KEY" value="${k}" dir="ltr"><input type="text" class="env-value" placeholder="VALUE" value="${v}" dir="ltr"><button onclick="this.remove()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:1.2rem;">✖</button>`;
        document.getElementById('envVarsContainer').appendChild(div);
    }

    function log(msg, isErr=false, isSuc=false) {
        const t = document.getElementById('terminalLogs');
        let color = '#b0ffd0';
        if(isErr) color = '#ff3366';
        if(isSuc) color = '#00ff99';
        t.innerHTML += `<div class="log-line" style="color:${color}">> ${msg}</div>`;
        t.scrollTop = t.scrollHeight;
    }

    function showProgress(s) { document.getElementById('progressContainer').classList.toggle('active', s); }
    function updateLineNumbers() {
        const lines = document.getElementById('codeInput').value.split('\n').length;
        document.getElementById('lineNumbers').innerHTML = Array.from({length: lines}, (_, i) => i + 1).join('<br>');
    }
    
    document.getElementById('codeInput').addEventListener('input', updateLineNumbers);
    document.getElementById('codeInput').addEventListener('scroll', function() { document.getElementById('lineNumbers').scrollTop = this.scrollTop; });
    
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            btn.classList.add('active');
            document.getElementById(btn.dataset.tab + 'Tab').style.display = 'block';
        };
    });
</script>
</body>
</html>
