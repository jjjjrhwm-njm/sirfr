<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>نجم كلاود | منصة الاستضافة السحابية v10.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0f1020;
            --card-bg: #161b33;
            --primary: #00d2ff;
            --primary-glow: rgba(0, 210, 255, 0.3);
            --success: #00ff99;
            --danger: #ff3366;
            --warning: #ffaa00;
            --update: #aa66ff;
            --text-light: #eef5ff;
            --text-muted: #8e9aaf;
            --border-dim: #2a2f4b;
            --code-bg: #0a0c18;
            --terminal-bg: #05070f;
            --gradient-btn: linear-gradient(95deg, #00d2ff, #3a0ca3);
            --gradient-update: linear-gradient(95deg, #aa66ff, #6a1b9a);
        }

        body {
            background: var(--bg-deep);
            font-family: 'Tajawal', sans-serif;
            color: var(--text-light);
            line-height: 1.5;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }

        /* شريط التحميل العلوي */
        .progress-bar-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(0, 210, 255, 0.2);
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            width: 0%;
            transition: width 0.3s ease-out;
            box-shadow: 0 0 10px var(--primary);
        }

        .progress-bar-container.active {
            opacity: 1;
        }

        .dashboard-container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 1rem;
        }

        .logo-area {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }

        .badge-version {
            background: var(--card-bg);
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .developer-card {
            background: linear-gradient(135deg, var(--card-bg) 0%, #0f1225 100%);
            border-radius: 20px;
            padding: 1.2rem 1.8rem;
            margin-bottom: 2rem;
            border: 1px solid var(--primary);
        }

        .developer-input-wrapper {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .developer-input-wrapper input {
            flex: 1;
            background: var(--code-bg);
            border: 1px solid var(--primary);
            border-radius: 60px;
            padding: 0.9rem 1.5rem;
            color: #fff;
            font-family: monospace;
        }

        .save-id-btn, .scan-projects-btn {
            background: transparent;
            border: 1px solid var(--primary);
            border-radius: 60px;
            padding: 0.7rem 1.5rem;
            color: var(--primary);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .save-id-btn:hover, .scan-projects-btn:hover {
            background: var(--primary);
            color: #000;
        }

        .tabs-nav {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-dim);
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 0.8rem 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: bold;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.8rem;
        }

        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 1.5rem;
            border: 1px solid rgba(0, 210, 255, 0.2);
        }

        .card-title {
            font-size: 1.3rem;
            margin-bottom: 1.4rem;
            border-right: 4px solid var(--primary);
            padding-right: 12px;
        }

        #projectName {
            width: 100%;
            background: var(--code-bg);
            border: 1px solid var(--border-dim);
            border-radius: 12px;
            padding: 0.8rem;
            color: #fff;
            margin-bottom: 1rem;
            font-family: monospace;
        }

        #codeInput {
            width: 100%;
            min-height: 300px;
            background: var(--code-bg);
            color: #fff;
            border-radius: 12px;
            padding: 1rem;
            font-family: monospace;
            border: 1px solid var(--border-dim);
        }

        .deploy-btn {
            background: var(--gradient-btn);
            color: #fff;
            width: 100%;
            padding: 1rem;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            border: none;
        }

        .deploy-btn.update-mode {
            background: var(--gradient-update);
        }

        .cancel-edit-btn {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            width: 100%;
            padding: 0.8rem;
            border-radius: 50px;
            margin-top: 0.5rem;
            cursor: pointer;
        }

        .env-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            align-items: center;
        }

        .env-row input {
            flex: 1;
            background: var(--code-bg);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            padding: 0.6rem;
            color: #fff;
        }

        .env-row button {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1.2rem;
        }

        .add-env-btn {
            background: transparent;
            border: 1px dashed var(--primary);
            color: var(--primary);
            width: 100%;
            padding: 0.6rem;
            border-radius: 40px;
            cursor: pointer;
            margin-bottom: 1rem;
        }

        .terminal {
            background: var(--terminal-bg);
            padding: 1rem;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8rem;
            border-radius: 12px;
            margin-top: 1rem;
            border: 1px solid var(--border-dim);
        }

        .projects-grid {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }

        .project-card {
            background: #1a1e3a;
            border-radius: 15px;
            padding: 1.2rem;
            border-right: 5px solid var(--success);
        }

        .project-card strong {
            color: var(--primary);
        }

        .project-actions {
            margin-top: 12px;
            display: flex;
            gap: 10px;
        }

        .project-actions button {
            background: transparent;
            border: 1px solid var(--primary);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            color: var(--primary);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="progress-bar-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
</div>

<div class="dashboard-container">
    <div class="header">
        <div class="logo-area">🚀 نجم كلاود | Najm Cloud</div>
        <div class="badge-version">v10.0 · Precision Sync</div>
    </div>

    <div class="developer-card">
        <div class="developer-input-wrapper">
            <input type="text" id="userIdInput" placeholder="أدخل معرفك (user_id)">
            <button id="saveUserIdBtn" class="save-id-btn">💾 حفظ</button>
            <button id="scanProjectsBtn" class="scan-projects-btn">📡 مسح المشاريع (الرادار)</button>
        </div>
        <div id="userIdStatus" style="margin-top:10px; color:var(--success); font-size:0.8rem;"></div>
    </div>

    <div class="tabs-nav">
        <button class="tab-btn active" data-tab="editor">✏️ محرر النشر</button>
        <button class="tab-btn" data-tab="projects">📁 مشاريعي</button>
    </div>

    <div id="editorTab" class="tab-content">
        <div class="dashboard-grid">
            <div class="card">
                <div class="card-title">📦 إعدادات المشروع</div>
                <input type="text" id="projectName" placeholder="اسم المشروع (project_name)">
                <textarea id="codeInput" placeholder="اكتب كودك هنا..."></textarea>
            </div>
            <div class="card">
                <div class="card-title">🔐 المتغيرات السرية (Environment Variables)</div>
                <div id="envVarsContainer"></div>
                <button id="addEnvBtn" class="add-env-btn">+ إضافة متغير جديد</button>
                <button id="deployBtn" class="deploy-btn">🚀 نشر المشروع الآن</button>
                <button id="cancelEditBtn" class="cancel-edit-btn" style="display:none;">✖ إلغاء التعديل</button>
                <div id="terminalLogs" class="terminal">
                    <span style="color: #00d2ff;">⚡ جاهز للنشر</span>
                </div>
            </div>
        </div>
    </div>

    <div id="projectsTab" class="tab-content" style="display:none;">
        <div class="card">
            <div class="card-title">📁 مشاريعي المستضافة</div>
            <div id="projectsGrid" class="projects-grid">
                <div style="color: var(--text-muted);">قم بمسح المشاريع أولاً باستخدام زر "مسح المشاريع"</div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- المتغيرات العامة ---
    let currentEditProject = null;      // اسم المشروع الجاري تعديله
    let projectsCache = [];             // ذاكرة مؤقتة للمشاريع المسترجعة

    // --- دوال مساعدة ---
    function decodeHtml(html) {
        return html.replace(/&lt;/g, '<')
                   .replace(/&gt;/g, '>')
                   .replace(/&amp;/g, '&')
                   .replace(/&quot;/g, '"')
                   .replace(/&#39;/g, "'")
                   .replace(/<br\s*\/?>/gi, '\n');
    }

    function showProgress(show, percent = 0) {
        const container = document.getElementById('progressContainer');
        const bar = document.getElementById('progressBar');
        if (show) {
            container.classList.add('active');
            bar.style.width = percent + '%';
        } else {
            container.classList.remove('active');
            bar.style.width = '0%';
        }
    }

    function updateProgress(percent) {
        const bar = document.getElementById('progressBar');
        bar.style.width = percent + '%';
    }

    function addTerminalLog(message, isError = false) {
        const terminal = document.getElementById('terminalLogs');
        const logLine = document.createElement('div');
        logLine.style.color = isError ? '#ff3366' : '#00ff99';
        logLine.innerHTML = `> ${new Date().toLocaleTimeString()} | ${message}`;
        terminal.appendChild(logLine);
        terminal.scrollTop = terminal.scrollHeight;
    }

    // --- إدارة المتغيرات (Key/Value) ---
    function createEnvRow(key = '', value = '') {
        const div = document.createElement('div');
        div.className = 'env-row';
        div.innerHTML = `
            <input type="text" class="env-key" placeholder="KEY" value="${escapeHtml(key)}">
            <input type="text" class="env-value" placeholder="VALUE" value="${escapeHtml(value)}">
            <button class="remove-env" title="حذف">✖</button>
        `;
        div.querySelector('.remove-env').addEventListener('click', () => div.remove());
        return div;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getEnvironmentVariables() {
        const rows = document.querySelectorAll('#envVarsContainer .env-row');
        const env = {};
        rows.forEach(row => {
            const key = row.querySelector('.env-key').value.trim();
            const value = row.querySelector('.env-value').value;
            if (key) env[key] = value;
        });
        return env;
    }

    function loadEnvironmentVariables(envObj) {
        const container = document.getElementById('envVarsContainer');
        container.innerHTML = '';
        Object.entries(envObj).forEach(([key, value]) => {
            container.appendChild(createEnvRow(key, value));
        });
    }

    // --- استخراج الكود والمتغيرات من رسالة تليجرام (للرادار) ---
    function extractCode(content) {
        const match = content.match(/\[CODE_BLOCK\]([\s\S]*?)\[CODE_BLOCK\]/i);
        return match ? decodeHtml(match[1].trim()) : '';
    }

    function extractVars(content) {
        const match = content.match(/\[VARS_BLOCK\]([\s\S]*?)\[VARS_BLOCK\]/i);
        if (match) {
            try {
                let varsText = decodeHtml(match[1].trim().replace(/<[^>]*>/g, ''));
                return JSON.parse(varsText);
            } catch(e) {
                return {};
            }
        }
        return {};
    }

    // --- الرادار: مسح المشاريع باستخدام AllOrigins Proxy ---
    async function scanProjects() {
        const uid = document.getElementById('userIdInput').value.trim();
        if (!uid) {
            addTerminalLog('❌ يرجى إدخال معرف المستخدم أولاً', true);
            return;
        }

        showProgress(true, 10);
        updateProgress(20);
        addTerminalLog(`🔍 بدء مسح المشاريع للمعرف: ${uid}...`);

        const grid = document.getElementById('projectsGrid');
        grid.innerHTML = '<div style="color: var(--primary);">جاري المسح والتحليل...</div>';

        try {
            // استخدام AllOrigins مع كسر الكاش باستخدام timestamp
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent('https://t.me/s/nejm_njm?t=' + Date.now())}`;
            const response = await fetch(proxyUrl);
            updateProgress(60);
            const html = await response.text();
            updateProgress(80);

            // تقسيم الرسائل بناءً على class="tgme_widget_message_text"
            const messages = [];
            const messageRegex = /<div class="tgme_widget_message_text"[^>]*>([\s\S]*?)<\/div>/gi;
            let match;
            while ((match = messageRegex.exec(html)) !== null) {
                messages.push(match[1]);
            }

            projectsCache = [];
            messages.forEach(msg => {
                if (msg.includes('---METADATA---')) {
                    const metaMatch = msg.match(/---METADATA---({[\s\S]*?})---METADATA---/);
                    if (metaMatch) {
                        try {
                            const meta = JSON.parse(decodeHtml(metaMatch[1].replace(/<[^>]*>/g, '')));
                            if (meta.uid === uid) {
                                projectsCache.push({
                                    name: meta.pid,
                                    code: extractCode(msg),
                                    env: extractVars(msg),
                                    url: `https://vercelseifr.vercel.app/${uid}/${meta.pid}`
                                });
                            }
                        } catch(e) { /* تجاهل الأخطاء الفردية */ }
                    }
                }
            });

            updateProgress(100);
            renderProjects();
            addTerminalLog(`✅ اكتمل المسح! تم العثور على ${projectsCache.length} مشروع(ات).`);
        } catch (e) {
            console.error(e);
            addTerminalLog(`❌ فشل المسح: ${e.message}`, true);
            grid.innerHTML = '<div style="color: var(--danger);">خطأ في الاتصال أو التحليل</div>';
        }
        setTimeout(() => showProgress(false), 500);
    }

    function renderProjects() {
        const grid = document.getElementById('projectsGrid');
        if (projectsCache.length === 0) {
            grid.innerHTML = '<div style="color: var(--text-muted);">لا توجد مشاريع لهذا المعرف.</div>';
            return;
        }

        grid.innerHTML = projectsCache.map(p => `
            <div class="project-card">
                <strong>📦 ${escapeHtml(p.name)}</strong>
                <div class="project-actions">
                    <button class="edit-project-btn" data-project='${JSON.stringify(p).replace(/'/g, "&#39;")}'>✏️ تعديل</button>
                    <button onclick="window.open('${p.url}', '_blank')">🌍 زيارة</button>
                </div>
            </div>
        `).join('');

        // إضافة مستمعات لأزرار التعديل
        document.querySelectorAll('.edit-project-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const projectData = JSON.parse(btn.dataset.project);
                loadToEdit(projectData);
            });
        });
    }

    // --- وضع التعديل الذكي ---
    function loadToEdit(project) {
        document.getElementById('projectName').value = project.name;
        document.getElementById('codeInput').value = project.code;
        loadEnvironmentVariables(project.env);

        currentEditProject = project.name;
        const deployBtn = document.getElementById('deployBtn');
        deployBtn.innerText = "🔄 تحديث المشروع الحالي";
        deployBtn.classList.add('update-mode');
        document.getElementById('cancelEditBtn').style.display = 'block';

        addTerminalLog(`✏️ جاري تعديل المشروع: ${project.name}`);
        // التبديل إلى تبويب المحرر
        document.querySelector('[data-tab="editor"]').click();
    }

    function cancelEdit() {
        currentEditProject = null;
        const deployBtn = document.getElementById('deployBtn');
        deployBtn.innerText = "🚀 نشر المشروع الآن";
        deployBtn.classList.remove('update-mode');
        document.getElementById('cancelEditBtn').style.display = 'none';
        addTerminalLog(`🔄 تم إلغاء وضع التعديل`);
    }

    // --- وظيفة النشر الأساسية (ترسل للباكند) ---
    async function performDeploy() {
        const userId = document.getElementById('userIdInput').value.trim();
        const projectName = document.getElementById('projectName').value.trim();
        const code = document.getElementById('codeInput').value;
        const envVars = getEnvironmentVariables();

        if (!userId) {
            addTerminalLog('❌ يرجى حفظ معرف المستخدم أولاً', true);
            return;
        }
        if (!projectName) {
            addTerminalLog('❌ يرجى إدخال اسم المشروع', true);
            return;
        }
        if (!code) {
            addTerminalLog('❌ لا يمكن نشر مشروع بدون كود', true);
            return;
        }

        const payload = {
            user_id: userId,
            project_name: projectName,
            code: code,
            environment_variables: envVars
        };

        addTerminalLog(`🌐 Connecting... (نشر: ${projectName})`);
        showProgress(true, 10);

        try {
            updateProgress(30);
            addTerminalLog(`📤 Sending... جاري إرسال البيانات إلى الخادم`);

            const response = await fetch('https://your-worker-name.workers.dev', { // استبدل هذا بالرابط الحقيقي للـ Worker
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            updateProgress(80);
            const result = await response.json();

            if (result.success) {
                updateProgress(100);
                addTerminalLog(`✅ Done! تم النشر بنجاح`);
                addTerminalLog(`🔗 الرابط النهائي: https://vercelseifr.vercel.app/${userId}/${projectName}`);
                
                // تحديث القائمة المحلية بعد النجاح
                await scanProjects(); // إعادة مسح لتحديث القائمة
                
                if (currentEditProject) {
                    cancelEdit(); // إلغاء وضع التعديل بعد التحديث الناجح
                }
            } else {
                throw new Error(result.error || 'فشل النشر من الخادم');
            }
        } catch (error) {
            addTerminalLog(`❌ خطأ: ${error.message}`, true);
        } finally {
            setTimeout(() => showProgress(false), 800);
        }
    }

    // --- حفظ المعرف في localStorage ---
    function saveUserId() {
        const userId = document.getElementById('userIdInput').value.trim();
        if (userId) {
            localStorage.setItem('najm_user_id', userId);
            document.getElementById('userIdStatus').innerHTML = `✅ تم حفظ المعرف: ${userId}`;
            addTerminalLog(`💾 تم حفظ المعرف: ${userId}`);
        } else {
            document.getElementById('userIdStatus').innerHTML = `⚠️ المعرف لا يمكن أن يكون فارغاً`;
        }
    }

    function loadUserId() {
        const saved = localStorage.getItem('najm_user_id');
        if (saved) {
            document.getElementById('userIdInput').value = saved;
            document.getElementById('userIdStatus').innerHTML = `✅ المعرف المحفوظ: ${saved}`;
        }
    }

    // --- تبديل التبويبات ---
    function initTabs() {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
                document.getElementById(btn.dataset.tab + 'Tab').style.display = 'block';
            });
        });
    }

    // --- تهيئة الصفحة ---
    function init() {
        loadUserId();
        initTabs();
        
        // إضافة مستمعات الأحداث
        document.getElementById('saveUserIdBtn').addEventListener('click', saveUserId);
        document.getElementById('scanProjectsBtn').addEventListener('click', scanProjects);
        document.getElementById('addEnvBtn').addEventListener('click', () => {
            document.getElementById('envVarsContainer').appendChild(createEnvRow());
        });
        document.getElementById('deployBtn').addEventListener('click', performDeploy);
        document.getElementById('cancelEditBtn').addEventListener('click', cancelEdit);
        
        // إضافة صف متغير افتراضي لتوضيح الفكرة
        document.getElementById('envVarsContainer').appendChild(createEnvRow('', ''));
    }

    // بدء التشغيل
    init();
</script>
</body>
</html>
