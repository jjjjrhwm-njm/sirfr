<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نجم كلاود | منصة الاستضافة السحابية</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f1020; font-family: 'Tajawal', system-ui; color: #eef5ff; padding: 2rem; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 2px solid #00d2ff; padding-bottom: 1rem; }
        .logo { font-size: 1.8rem; font-weight: bold; background: linear-gradient(135deg, #fff, #00d2ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .badge { background: #161b33; padding: 0.3rem 0.8rem; border-radius: 40px; font-size: 0.8rem; border: 1px solid #00d2ff; }
        .developer-card { background: linear-gradient(135deg, #161b33, #0f1225); border-radius: 20px; padding: 1.2rem 1.8rem; margin-bottom: 2rem; border: 1px solid #00d2ff; }
        .input-wrapper { display: flex; gap: 12px; flex-wrap: wrap; }
        .input-wrapper input { flex: 1; background: #0a0c18; border: 1px solid #2a2f4b; border-radius: 60px; padding: 0.9rem 1.5rem; color: white; }
        button { background: transparent; border: 1px solid #00d2ff; border-radius: 60px; padding: 0.7rem 1.5rem; color: #00d2ff; cursor: pointer; font-weight: bold; }
        button:hover { background: #00d2ff; color: #0f1020; }
        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid #2a2f4b; padding-bottom: 0.5rem; }
        .tab { background: none; border: none; padding: 0.8rem 1.5rem; color: #8e9aaf; cursor: pointer; }
        .tab.active { color: #00d2ff; border-bottom: 2px solid #00d2ff; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.8rem; }
        .card { background: #161b33; border-radius: 28px; padding: 1.5rem; border: 1px solid rgba(0, 210, 255, 0.2); }
        .card-title { font-size: 1.3rem; margin-bottom: 1.4rem; border-right: 4px solid #00d2ff; padding-right: 12px; }
        textarea { width: 100%; min-height: 280px; background: #0a0c18; border: 1px solid #2a2f4b; border-radius: 20px; padding: 1rem; color: white; font-family: monospace; font-size: 0.85rem; }
        .env-item { display: flex; gap: 0.8rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
        .env-item input { flex: 1; background: #0a0c18; border: 1px solid #2a2f4b; border-radius: 12px; padding: 0.5rem; color: white; }
        .delete-env { background: none; border: none; color: #ff3366; cursor: pointer; font-size: 1.2rem; padding: 0 8px; }
        .btn-secondary { background: transparent; border: 1px dashed #00d2ff; padding: 0.5rem 1rem; border-radius: 40px; color: #00d2ff; cursor: pointer; margin-top: 0.5rem; }
        .terminal { background: #05070f; border-radius: 20px; padding: 1rem; max-height: 280px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; margin-top: 1rem; }
        .log-line { padding: 5px 0; border-bottom: 1px dotted rgba(0,210,255,0.2); }
        .log-success { color: #00ff99; }
        .log-error { color: #ff3366; }
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
        .project-card { background: #0a0c18; border-radius: 20px; padding: 1rem; border: 1px solid #2a2f4b; }
        .project-name { color: #00d2ff; font-size: 1.1rem; margin-bottom: 0.5rem; }
        .project-actions { display: flex; gap: 10px; margin-top: 1rem; }
        .project-actions button { flex: 1; padding: 0.5rem; font-size: 0.8rem; }
        .empty-state { text-align: center; padding: 3rem; color: #8e9aaf; }
        .history-item { display: flex; justify-content: space-between; padding: 0.5rem; border-bottom: 1px solid #2a2f4b; }
        .final-url { background: #0f121f; padding: 0.8rem; border-radius: 14px; margin-top: 12px; border-right: 3px solid #00ff99; word-break: break-all; }
        .deploy-btn { background: linear-gradient(95deg, #00d2ff, #3a0ca3); border: none; padding: 1rem; font-size: 1.2rem; width: 100%; margin-top: 1rem; color: white; }
        .deploy-btn:hover { background: linear-gradient(95deg, #00d2ff, #5a2ca3); }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } body { padding: 1rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">🚀 نجم كلاود | Najm Cloud</div>
        <div class="badge">v15.0</div>
    </div>

    <div class="developer-card">
        <div style="margin-bottom: 12px;">🔑 معرف المطور (Developer ID)</div>
        <div class="input-wrapper">
            <input type="text" id="userIdInput" placeholder="مثال: najm_dev_001" dir="ltr">
            <button id="saveUserIdBtn">💾 حفظ المعرف</button>
            <button id="scanProjectsBtn">📡 مسح المشاريع</button>
        </div>
        <div id="userIdStatus" style="color: #00ff99; margin-top: 8px;"></div>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="editor">✏️ محرر النشر</button>
        <button class="tab" data-tab="projects">📁 مشاريعي</button>
        <button class="tab" data-tab="history">📜 سجل النشر</button>
    </div>

    <div id="editorTab" style="display: block;">
        <div class="grid">
            <div class="card">
                <div class="card-title">⚙️ معلومات المشروع</div>
                <input type="text" id="projectName" placeholder="اسم المشروع" dir="ltr" style="width:100%; background:#0a0c18; border:1px solid #2a2f4b; border-radius:12px; padding:0.8rem; margin-bottom:1rem; color:white;">
                <div class="card-title">💻 محرر الأكواد</div>
                <textarea id="codeInput" placeholder="// اكتب كود البوت هنا ..."></textarea>
            </div>
            <div class="card">
                <div class="card-title">🔐 المتغيرات البيئية</div>
                <div id="envVarsContainer"></div>
                <button id="addEnvBtn" class="btn-secondary">+ إضافة متغير</button>
                <button id="deployBtn" class="deploy-btn">🚀 نشر المشروع</button>
                <div class="card-title" style="margin-top:1rem;">📟 سجل النشر</div>
                <div id="terminalLogs" class="terminal"><div class="log-line">⏳ جاهز للنشر...</div></div>
                <div id="deployResult"></div>
            </div>
        </div>
    </div>

    <div id="projectsTab" style="display: none;">
        <div class="card">
            <div class="card-title">📁 مشاريعي</div>
            <div id="projectsGrid" class="projects-grid"><div class="empty-state">✨ قم بحفظ معرف المطور واضغط "مسح المشاريع"</div></div>
        </div>
    </div>

    <div id="historyTab" style="display: none;">
        <div class="card">
            <div class="card-title">📜 سجل النشر</div>
            <div id="historyLogs" class="terminal"><div class="empty-state">لا يوجد سجل</div></div>
        </div>
    </div>
</div>

<script>
    let projectsCache = [];
    let deploymentHistory = [];

    // تحميل البيانات من localStorage
    function loadData() {
        const savedId = localStorage.getItem('najm_developer_id');
        if (savedId) {
            document.getElementById('userIdInput').value = savedId;
            document.getElementById('userIdStatus').innerHTML = `✅ المعرف: ${escapeHtml(savedId)}`;
        }
        const savedProjects = localStorage.getItem('najm_projects_cache');
        if (savedProjects) {
            try {
                projectsCache = JSON.parse(savedProjects);
                renderProjects(projectsCache);
            } catch(e) {}
        }
        const savedHistory = localStorage.getItem('najm_deployment_history');
        if (savedHistory) {
            try {
                deploymentHistory = JSON.parse(savedHistory);
                renderHistory();
            } catch(e) {}
        }
    }

    function saveProjectsCache() {
        localStorage.setItem('najm_projects_cache', JSON.stringify(projectsCache));
    }

    function saveHistory() {
        localStorage.setItem('najm_deployment_history', JSON.stringify(deploymentHistory.slice(0, 20)));
        renderHistory();
    }

    function addToHistory(projectName, userId, status, message) {
        deploymentHistory.unshift({ project: projectName, userId, status, message, time: new Date().toLocaleString() });
        if (deploymentHistory.length > 20) deploymentHistory.pop();
        saveHistory();
    }

    function renderHistory() {
        const container = document.getElementById('historyLogs');
        if (!deploymentHistory.length) {
            container.innerHTML = '<div class="empty-state">📭 لا يوجد سجل</div>';
            return;
        }
        container.innerHTML = deploymentHistory.map(h => `
            <div class="history-item">
                <div>
                    <div style="color:#00d2ff">📦 ${escapeHtml(h.project)}</div>
                    <div style="font-size:0.7rem; color:#8e9aaf">${h.time}</div>
                </div>
                <div style="color:${h.status === 'success' ? '#00ff99' : '#ff3366'}">${h.status === 'success' ? '✅ نجاح' : '❌ فشل'}</div>
            </div>
        `).join('');
    }

    function addLog(msg, isErr = false, isSuc = false) {
        const term = document.getElementById('terminalLogs');
        const line = document.createElement('div');
        line.className = 'log-line';
        if (isErr) line.classList.add('log-error');
        if (isSuc) line.classList.add('log-success');
        line.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        term.appendChild(line);
        term.scrollTop = term.scrollHeight;
    }

    function clearLogs() {
        document.getElementById('terminalLogs').innerHTML = '';
    }

    function renderProjects(projects) {
        const container = document.getElementById('projectsGrid');
        if (!projects || projects.length === 0) {
            container.innerHTML = '<div class="empty-state">✨ لا توجد مشاريع</div>';
            return;
        }
        container.innerHTML = projects.map(p => `
            <div class="project-card">
                <div class="project-name">📦 ${escapeHtml(p.name)}</div>
                <div style="font-size:0.7rem; color:#8e9aaf; word-break:break-all">${p.url || ''}</div>
                <div class="project-actions">
                    <button onclick="editProject('${escapeHtml(p.name)}')">✏️ تعديل</button>
                    <button onclick="window.open('${p.url}', '_blank')">🔗 زيارة</button>
                    <button onclick="deleteProject('${escapeHtml(p.name)}')">🗑️ حذف</button>
                </div>
            </div>
        `).join('');
    }

    window.editProject = function(projectName) {
        const userId = getCurrentUserId();
        if (!userId) { alert('حفظ معرف المطور أولاً'); return; }
        const project = projectsCache.find(p => p.name === projectName);
        if (project) {
            document.getElementById('projectName').value = project.name;
            document.getElementById('codeInput').value = project.code || '';
            const container = document.getElementById('envVarsContainer');
            container.innerHTML = '';
            if (project.envVars) {
                Object.entries(project.envVars).forEach(([k, v]) => {
                    container.appendChild(createEnvRow(k, v));
                });
            }
            addLog(`✅ تم تحميل "${projectName}" للتعديل`, false, true);
        } else {
            addLog(`❌ لم يتم العثور على "${projectName}"`, true);
        }
        document.querySelector('[data-tab="editor"]').click();
    };

    window.deleteProject = function(projectName) {
        if (confirm(`هل تريد حذف مشروع "${projectName}"؟`)) {
            projectsCache = projectsCache.filter(p => p.name !== projectName);
            saveProjectsCache();
            renderProjects(projectsCache);
            addLog(`🗑️ تم حذف "${projectName}"`, false, true);
        }
    };

    function getCurrentUserId() {
        return document.getElementById('userIdInput').value.trim();
    }

    function saveUserId() {
        const id = getCurrentUserId();
        if (id) {
            localStorage.setItem('najm_developer_id', id);
            document.getElementById('userIdStatus').innerHTML = `✅ تم حفظ: ${escapeHtml(id)}`;
        } else {
            localStorage.removeItem('najm_developer_id');
            document.getElementById('userIdStatus').innerHTML = `⚠️ أدخل معرف المطور`;
        }
    }

    function scanProjects() {
        const userId = getCurrentUserId();
        if (!userId) {
            alert('حفظ معرف المطور أولاً');
            return;
        }
        addLog(`🔍 جاري البحث عن مشاريع المطور: ${userId}`);
        // المشاريع موجودة في projectsCache
        const userProjects = projectsCache.filter(p => p.userId === userId || true); // كل المشاريع للمستخدم الحالي
        addLog(`✅ تم العثور على ${projectsCache.length} مشروع`);
        renderProjects(projectsCache);
        document.querySelector('[data-tab="projects"]').click();
    }

    function collectEnvVars() {
        const items = document.querySelectorAll('.env-item');
        const obj = {};
        items.forEach(item => {
            const key = item.querySelector('.env-key')?.value.trim();
            const val = item.querySelector('.env-value')?.value;
            if (key) obj[key] = val;
        });
        return obj;
    }

    function createEnvRow(keyVal = '', valVal = '') {
        const div = document.createElement('div');
        div.className = 'env-item';
        const keyInput = document.createElement('input');
        keyInput.type = 'text';
        keyInput.className = 'env-key';
        keyInput.placeholder = 'KEY';
        keyInput.dir = 'ltr';
        keyInput.value = keyVal;
        const valueInput = document.createElement('input');
        valueInput.type = 'text';
        valueInput.className = 'env-value';
        valueInput.placeholder = 'VALUE';
        valueInput.dir = 'ltr';
        valueInput.value = valVal;
        const delBtn = document.createElement('button');
        delBtn.innerText = '✖';
        delBtn.className = 'delete-env';
        delBtn.onclick = () => div.remove();
        div.appendChild(keyInput);
        div.appendChild(valueInput);
        div.appendChild(delBtn);
        return div;
    }

    async function performDeploy() {
        const userId = getCurrentUserId();
        if (!userId) { addLog('❌ معرف المطور مطلوب', true); return false; }
        const projectName = document.getElementById('projectName').value.trim();
        const codeContent = document.getElementById('codeInput').value;
        if (!projectName) { addLog('❌ اسم المشروع مطلوب', true); return false; }
        if (!codeContent) { addLog('❌ الكود مطلوب', true); return false; }

        clearLogs();
        addLog('🔄 بدء النشر...');
        addLog(`👤 ${userId} | 📦 ${projectName}`);
        const envVars = collectEnvVars();
        addLog(`🔑 ${Object.keys(envVars).length} متغير`);

        const projectData = {
            name: projectName,
            code: codeContent,
            envVars: envVars,
            userId: userId,
            timestamp: Date.now(),
            url: `https://vercelseifr.vercel.app/${encodeURIComponent(userId)}/${encodeURIComponent(projectName)}`
        };

        // حفظ في cache
        const existingIndex = projectsCache.findIndex(p => p.name === projectName);
        if (existingIndex !== -1) {
            projectsCache[existingIndex] = projectData;
        } else {
            projectsCache.unshift(projectData);
        }
        saveProjectsCache();

        // محاولة إرسال للتليجرام (نسخة احتياطية)
        try {
            await fetch('https://najm-backend.60jrhwm.workers.dev/deploy', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, project_name: projectName, code: codeContent, environment_variables: envVars })
            });
        } catch(e) { console.log('Telegram backup failed'); }

        addLog('✅ نشر ناجح!', false, true);
        addLog(`🌍 ${projectData.url}`, false, true);
        document.getElementById('deployResult').innerHTML = `<div class="final-url">🚀 نشر ناجح! <a href="${projectData.url}" target="_blank" style="color: #00ff99;">${projectData.url}</a></div>`;
        addToHistory(projectName, userId, 'success', 'نشر ناجح');
        renderProjects(projectsCache);
        return true;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    // إعداد الأزرار
    document.getElementById('saveUserIdBtn').onclick = saveUserId;
    document.getElementById('scanProjectsBtn').onclick = scanProjects;
    document.getElementById('addEnvBtn').onclick = () => document.getElementById('envVarsContainer').appendChild(createEnvRow('', ''));
    document.getElementById('deployBtn').onclick = async () => { await performDeploy(); };

    // التبويبات
    document.querySelectorAll('.tab').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('editorTab').style.display = 'none';
            document.getElementById('projectsTab').style.display = 'none';
            document.getElementById('historyTab').style.display = 'none';
            if (btn.dataset.tab === 'editor') document.getElementById('editorTab').style.display = 'block';
            if (btn.dataset.tab === 'projects') { document.getElementById('projectsTab').style.display = 'block'; renderProjects(projectsCache); }
            if (btn.dataset.tab === 'history') { document.getElementById('historyTab').style.display = 'block'; renderHistory(); }
        };
    });

    // إعدادات أولية
    loadData();
    const envContainer = document.getElementById('envVarsContainer');
    envContainer.innerHTML = '';
    envContainer.appendChild(createEnvRow('API_TOKEN', 'your_secret_123'));
    
    if (!document.getElementById('codeInput').value) {
        document.getElementById('codeInput').value = `// نجم كلاود v15.0
console.log("Najm Cloud Active");

async function handler(request) {
    return new Response(JSON.stringify({
        message: "مرحباً من نجم كلاود!",
        version: "15.0",
        status: "active"
    }), {
        headers: { "Content-Type": "application/json" }
    });
}`;
    }
    if (!document.getElementById('projectName').value) {
        document.getElementById('projectName').value = 'my-first-project';
    }
</script>
</body>
</html>
