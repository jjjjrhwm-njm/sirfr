<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>نجم كلاود | منصة الاستضافة السحابية v10.0</title>
    <style>
        /* [نفس التنسيق الرائع v9.0 الذي تفضله - لم يتغير شيء في الشكل] */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-deep: #0f1020; --card-bg: #161b33; --primary: #00d2ff; --primary-glow: rgba(0, 210, 255, 0.3); --success: #00ff99; --danger: #ff3366; --warning: #ffaa00; --update: #aa66ff; --text-light: #eef5ff; --text-muted: #8e9aaf; --border-dim: #2a2f4b; --code-bg: #0a0c18; --terminal-bg: #05070f; --gradient-btn: linear-gradient(95deg, #00d2ff, #3a0ca3); --gradient-update: linear-gradient(95deg, #aa66ff, #6a1b9a); }
        body { background: var(--bg-deep); font-family: 'Tajawal', sans-serif; color: var(--text-light); line-height: 1.5; padding: 2rem 1.5rem; min-height: 100vh; }
        .progress-bar-container { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: rgba(0, 210, 255, 0.2); z-index: 10000; opacity: 0; transition: opacity 0.3s; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--success)); width: 0%; transition: width 0.3s ease-out; box-shadow: 0 0 10px var(--primary); }
        .progress-bar-container.active { opacity: 1; }
        .dashboard-container { max-width: 1600px; margin: 0 auto; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; border-bottom: 2px solid var(--primary); padding-bottom: 1rem; }
        .logo-area { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
        .badge-version { background: var(--card-bg); padding: 0.3rem 0.8rem; border-radius: 40px; font-size: 0.8rem; border: 1px solid var(--primary); color: var(--primary); }
        .developer-card { background: linear-gradient(135deg, var(--card-bg) 0%, #0f1225 100%); border-radius: 20px; padding: 1.2rem 1.8rem; margin-bottom: 2rem; border: 1px solid var(--primary); }
        .developer-input-wrapper { display: flex; gap: 12px; flex-wrap: wrap; }
        .developer-input-wrapper input { flex: 1; background: var(--code-bg); border: 1px solid var(--primary); border-radius: 60px; padding: 0.9rem 1.5rem; color: #fff; font-family: monospace; }
        .save-id-btn, .scan-projects-btn { background: transparent; border: 1px solid var(--primary); border-radius: 60px; padding: 0.7rem 1.5rem; color: var(--primary); font-weight: bold; cursor: pointer; }
        .save-id-btn:hover, .scan-projects-btn:hover { background: var(--primary); color: #000; }
        .tabs-nav { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border-dim); }
        .tab-btn { background: transparent; border: none; padding: 0.8rem 1.5rem; color: var(--text-muted); cursor: pointer; font-weight: bold; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.8rem; }
        @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }
        .card { background: var(--card-bg); border-radius: 28px; padding: 1.5rem; border: 1px solid rgba(0, 210, 255, 0.2); }
        .card-title { font-size: 1.3rem; margin-bottom: 1.4rem; border-right: 4px solid var(--primary); padding-right: 12px; }
        #codeInput { width: 100%; min-height: 300px; background: var(--code-bg); color: #fff; border-radius: 12px; padding: 1rem; font-family: monospace; }
        .deploy-btn { background: var(--gradient-btn); color: #fff; width: 100%; padding: 1rem; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 1rem; }
        .deploy-btn.update-mode { background: var(--gradient-update); }
        .project-card { background: #1a1e3a; border-radius: 15px; padding: 1.2rem; border-right: 5px solid var(--success); }
        .terminal { background: #000; padding: 1rem; height: 200px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; border-radius: 12px; margin-top: 1rem; }
    </style>
</head>
<body>

<div class="progress-bar-container" id="progressContainer"><div class="progress-bar" id="progressBar"></div></div>

<div class="dashboard-container">
    <div class="header">
        <div class="logo-area">🚀 نجم كلاود | Najm Cloud</div>
        <div class="badge-version">v10.0 · Precision Sync</div>
    </div>

    <div class="developer-card">
        <div class="developer-input-wrapper">
            <input type="text" id="userIdInput" placeholder="أدخل معرفك">
            <button id="saveUserIdBtn" class="save-id-btn">💾 حفظ</button>
            <button id="scanProjectsBtn" class="scan-projects-btn">📡 مسح المشاريع</button>
        </div>
        <div id="userIdStatus" style="margin-top:10px; color:var(--success);"></div>
    </div>

    <div class="tabs-nav">
        <button class="tab-btn active" data-tab="editor">✏️ محرر النشر</button>
        <button class="tab-btn" data-tab="projects">📁 مشاريعي</button>
    </div>

    <div id="editorTab" class="tab-content">
        <div class="dashboard-grid">
            <div class="card">
                <div class="card-title">📦 الإعدادات</div>
                <input type="text" id="projectName" placeholder="اسم المشروع">
                <textarea id="codeInput"></textarea>
            </div>
            <div class="card">
                <div class="card-title">🔐 المتغيرات والسجلات</div>
                <div id="envVarsContainer"></div>
                <button id="addEnvBtn" class="tab-btn" style="border:1px dashed var(--primary); width:100%;">+ متغير جديد</button>
                <button id="deployBtn" class="deploy-btn">🚀 نشر المشروع الآن</button>
                <button id="cancelEditBtn" class="tab-btn" style="display:none; color:var(--danger); width:100%;">✖ إلغاء التعديل</button>
                <div id="terminalLogs" class="terminal"></div>
            </div>
        </div>
    </div>

    <div id="projectsTab" class="tab-content" style="display:none;">
        <div class="card">
            <div id="projectsGrid" class="projects-grid"></div>
        </div>
    </div>
</div>

<script>
    let currentEditProject = null;
    let projectsCache = [];

    // --- 🛠️ استخراج الكود الصافي بنظام v10 ---
    function extractCode(content) {
        const match = content.match(/\[CODE_BLOCK\]([\s\S]*?)\[CODE_BLOCK\]/i);
        return match ? decodeHtml(match[1].trim()) : '';
    }

    // --- 🛠️ استخراج المتغيرات الصافية بنظام v10 ---
    function extractVars(content) {
        const match = content.match(/\[VARS_BLOCK\]([\s\S]*?)\[VARS_BLOCK\]/i);
        if (match) {
            try { return JSON.parse(decodeHtml(match[1].trim().replace(/<[^>]*>/g, ''))); } catch(e) { return {}; }
        }
        return {};
    }

    async function scanProjects() {
        const uid = document.getElementById('userIdInput').value.trim();
        if(!uid) return;
        showProgress(true);
        const grid = document.getElementById('projectsGrid');
        grid.innerHTML = "جاري المسح...";

        try {
            const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent('https://t.me/s/nejm_njm?t=' + Date.now())}`);
            const html = await res.text();
            const messages = html.split('tgme_widget_message_text').reverse();
            
            projectsCache = [];
            messages.forEach(msg => {
                if (msg.includes('---METADATA---')) {
                    const metaMatch = msg.match(/---METADATA---({[\s\S]*?})---METADATA---/);
                    if (metaMatch) {
                        const meta = JSON.parse(decodeHtml(metaMatch[1].replace(/<[^>]*>/g, '')));
                        if (meta.uid === uid) {
                            projectsCache.push({
                                name: meta.pid,
                                code: extractCode(msg),
                                env: extractVars(msg),
                                url: `https://vercelseifr.vercel.app/${uid}/${meta.pid}`
                            });
                        }
                    }
                }
            });
            renderProjects();
        } catch(e) { console.error(e); }
        showProgress(false);
    }

    function renderProjects() {
        const grid = document.getElementById('projectsGrid');
        grid.innerHTML = projectsCache.map(p => `
            <div class="project-card">
                <strong>📦 ${p.name}</strong>
                <div style="margin-top:10px; display:flex; gap:10px;">
                    <button class="save-id-btn" onclick='loadToEdit(${JSON.stringify(p)})'>✏️ تعديل</button>
                    <button class="save-id-btn" onclick="window.open('${p.url}')">🌍 زيارة</button>
                </div>
            </div>
        `).join('') || "لا توجد مشاريع.";
    }

    window.loadToEdit = (p) => {
        document.getElementById('projectName').value = p.name;
        document.getElementById('codeInput').value = p.code;
        const container = document.getElementById('envVarsContainer');
        container.innerHTML = '';
        Object.entries(p.env).forEach(([k, v]) => container.appendChild(createEnvRow(k, v)));
        
        document.getElementById('deployBtn').innerText = "🔄 تحديث المشروع الحالي";
        document.getElementById('deployBtn').classList.add('update-mode');
        document.getElementById('cancelEditBtn').style.display = 'block';
        document.querySelector('[data-tab="editor"]').click();
    };

    // --- وظائف مساعدة ---
    function decodeHtml(h) { return h.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&').replace(/&quot;/g, '"').replace(/&#39;/g, "'").replace(/<br\s*\/?>/gi, '\n'); }
    function showProgress(s) { document.getElementById('progressContainer').classList.toggle('active', s); }
    function createEnvRow(k='', v='') {
        const d = document.createElement('div');
        d.style = "display:flex; gap:5px; margin-bottom:10px;";
        d.innerHTML = `<input type="text" value="${k}" placeholder="KEY" style="flex:1;"><input type="text" value="${v}" placeholder="VALUE" style="flex:2;"><button onclick="this.parentElement.remove()" style="color:red; background:none; border:none; cursor:pointer;">✖</button>`;
        return d;
    }

    // --- الأحداث ---
    document.getElementById('scanProjectsBtn').onclick = scanProjects;
    document.getElementById('addEnvBtn').onclick = () => document.getElementById('envVarsContainer').appendChild(createEnvRow());
    document.querySelectorAll('.tab-btn').forEach(b => b.onclick = () => {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById(b.dataset.tab + 'Tab').style.display = 'block';
    });
</script>
</body>
</html>
